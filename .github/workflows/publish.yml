name: Build EXE Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - '.github/workflows/publish.yml'
      - 'Directory.Build.props'
      - '*.slnx'

permissions:
  contents: read

jobs:
  build_exes:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore

      - name: Publish ConsoleReader EXE
        run: dotnet publish ./src/ConsoleReader/ConsoleReader.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./dist/ConsoleReader

      - name: Publish ReplayWatcher EXE
        run: dotnet publish ./src/ReplayWatcher/ReplayWatcher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./dist/ReplayWatcher

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReplayTools-win-x64
          path: |
            dist/ConsoleReader/**
            dist/ReplayWatcher/**
